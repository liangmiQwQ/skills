<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowExplainer Test</title>

    <!-- React + Babel pinned -->
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
      }
      #root {
        min-height: 100vh;
      }

      /* Reduced motion overrides */
      @media (prefers-reduced-motion: reduce) {
        .explainer-node,
        .explainer-edge,
        .explainer-step-panel {
          transition-duration: 0ms !important;
          animation: none !important;
        }
        .explainer-node:hover {
          outline: 2px solid currentColor;
          outline-offset: 2px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Load the template -->
    <script type="text/babel" src="flow_explainer.jsx"></script>

    <script type="text/babel">
      function App() {
        return React.createElement(window.FlowExplainer, {
          data: window.FlowExplainerExampleData,
        });
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    </script>
  </body>
</html>
